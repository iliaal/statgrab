name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    name: PHP ${{ matrix.php }} - Linux NTS
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Install libstatgrab
        run: sudo apt-get update && sudo apt-get install -y libstatgrab-dev pkg-config

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          coverage: none

      - name: Build extension
        run: |
          phpize
          ./configure --with-statgrab
          make -j$(nproc)

      - name: Run test suite
        env:
          NO_INTERACTION: 1
          ASAN_OPTIONS: detect_leaks=0
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/statgrab.so"
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/
