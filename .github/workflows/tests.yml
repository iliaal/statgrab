name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    name: PHP ${{ matrix.php }} - Linux NTS
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6

      - name: Install libstatgrab
        run: sudo apt-get update && sudo apt-get install -y libstatgrab-dev pkg-config

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize, php-config
          coverage: none

      - name: Build extension
        run: |
          phpize
          ./configure --with-statgrab
          make -j$(nproc)

      - name: Run test suite
        env:
          NO_INTERACTION: 1
          ASAN_OPTIONS: detect_leaks=0
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/statgrab.so"
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/

  asan-bundled:
    name: PHP 8.4 - ASAN (bundled libstatgrab)
    runs-on: ubuntu-22.04
    env:
      ASAN_OPTIONS: exitcode=139:detect_odr_violation=0:detect_leaks=1:fast_unwind_on_malloc=0
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan.supp:print_suppressions=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      NO_INTERACTION: 1
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang re2c bison autoconf automake libtool \
                                  pkg-config libxml2-dev libsqlite3-dev

      - name: Resolve clang runtime dir
        id: clang_rt
        run: echo "dir=$(clang -print-runtime-dir)" >> "$GITHUB_OUTPUT"

      - name: Build PHP 8.4 with ASan
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          git clone --depth=1 --branch=PHP-8.4 https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure --enable-debug --disable-zts --disable-all --enable-cli \
                      --disable-cgi --disable-phpdbg --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build bundled libstatgrab (static)
        run: |
          cd vendor/libstatgrab
          autoreconf -fiv
          ./configure --enable-static --disable-shared --without-ncurses
          make -j$(nproc)

      - name: Build extension against bundled libstatgrab
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -shared-libasan -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined -shared-libasan" \
          ./configure --with-statgrab=bundled --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run test suite under ASan + LeakSanitizer
        env:
          LD_LIBRARY_PATH: ${{ steps.clang_rt.outputs.dir }}
        run: |
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=$(pwd)/modules/statgrab.so"
          /tmp/php-asan/bin/php run-tests.php --asan --show-diff -g FAIL,BORK,LEAK,XLEAK tests/
