name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    name: PHP ${{ matrix.php }} (Linux)
    steps:
      - uses: actions/checkout@v4

      - name: Install libstatgrab
        run: sudo apt-get update && sudo apt-get install -y libstatgrab-dev pkg-config

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize
          coverage: none

      - name: phpize + configure
        run: |
          phpize
          ./configure --with-statgrab

      - name: make
        run: make -j$(nproc)

      - name: make test
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: |
          NO_INTERACTION=1 \
          REPORT_EXIT_STATUS=1 \
          TEST_PHP_ARGS="-q -d extension=$(pwd)/modules/statgrab.so" \
          make test
